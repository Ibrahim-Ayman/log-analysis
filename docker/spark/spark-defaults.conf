# ============================================================
# Spark Defaults — Optimized for low-disk, S3-streaming workload
# ============================================================

# --- Memory Management (fit inside Docker container) ---
spark.executor.memory                   512m
spark.driver.memory                     512m
spark.executor.memoryOverhead           256m

# --- Shuffle (minimize local disk spill) ---
spark.sql.shuffle.partitions            8
spark.local.dir                         /tmp/spark-tmp

# --- S3A Configuration (streaming, no local buffer) ---
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.fast.upload         true
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.connection.ssl.enabled  true

# --- Output ---
spark.sql.parquet.compression.codec     snappy

spark.master                                    spark://spark-master:7077
spark.hadoop.fs.s3a.aws.credentials.provider    com.amazonaws.auth.EnvironmentVariableCredentialsProvider

# --- REST API for remote job submission ---
spark.master.rest.enabled                       true
spark.master.rest.port                          6066
