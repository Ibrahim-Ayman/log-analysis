x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./spark:/opt/airflow/spark
    - ./scripts:/opt/airflow/scripts
    - airflow-logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - pipeline

services:

  # PostgreSQL — Airflow metadata database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-airflow}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline

  # Airflow Init — One-shot: migrate DB + create admin user
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${AIRFLOW_ADMIN_USERNAME:-admin} \
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true
        echo "Airflow init complete."
    restart: "no"

  # Airflow Webserver — UI on port 8080
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler — runs DAGs
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname $(hostname)
            || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Spark Master — Cluster manager on port 8081
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    env_file: .env # shared AWS creds
    environment:
      - SPARK_MASTER_HOST=spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      -h spark-master
      --properties-file /opt/spark/conf/spark-defaults.conf
    volumes:
      - ./spark:/opt/spark/jobs
    ports:
      - "9090:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    env_file: .env
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 -m 3G -c 3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark:/opt/spark/jobs
    networks:
      - pipeline

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    env_file: .env
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 -m 3G -c 3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark:/opt/spark/jobs
    networks:
      - pipeline

  # Apache Superset — Dashboards on port 8088
  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@superset.com}
      MOTHERDUCK_TOKEN: ${MOTHERDUCK_TOKEN}
      MOTHERDUCK_DATABASE: ${MOTHERDUCK_DATABASE}
    entrypoint: /bin/bash
    command: /app/superset-init.sh
    ports:
      - "8088:8088"
    volumes:
      - superset-data:/app/superset_home
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8088/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - pipeline

volumes:
  postgres-data: # Airflow metadata (~50 MB)
  airflow-logs: # Airflow task logs (~10-50 MB, rotated)
  superset-data:
    # Superset metadata (~20 MB)

networks:
  pipeline:
    driver: bridge
